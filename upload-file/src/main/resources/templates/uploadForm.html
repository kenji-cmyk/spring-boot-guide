<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload — Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: #FFFFFF;
            --foreground: #000000;
            --muted: #F5F5F5;
            --muted-foreground: #525252;
            --border: #000000;
            --border-light: #E5E5E5;
            
            --font-display: "Playfair Display", Georgia, serif;
            --font-body: "Source Serif 4", Georgia, serif;
            --font-mono: "JetBrains Mono", monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: var(--font-body);
            font-size: 1rem;
            line-height: 1.625;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Global Pattern: Horizontal lines texture */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 1px,
                #000 1px,
                #000 2px
            );
            background-size: 100% 4px;
            opacity: 0.015;
            pointer-events: none;
            z-index: -1;
        }

        /* Noise texture overlay for paper-like quality */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: -1;
        }

        /* Container */
        .container {
            max-width: 72rem;
            margin: 0 auto;
            padding: 1.5rem 1.5rem;
        }

        @media (min-width: 768px) {
            .container {
                padding: 2rem 2rem;
            }
        }

        @media (min-width: 1024px) {
            .container {
                padding: 3rem 3rem;
            }
        }

        /* Hero section */
        .hero {
            padding: 6rem 0;
            border-bottom: 8px solid var(--foreground);
            margin-bottom: 4rem;
        }

        @media (min-width: 768px) {
            .hero {
                padding: 8rem 0;
                margin-bottom: 6rem;
            }
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            line-height: 1;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
        }

        @media (min-width: 768px) {
            .hero h1 {
                font-size: 6rem;
            }
        }

        @media (min-width: 1024px) {
            .hero h1 {
                font-size: 8rem;
            }
        }

        .hero p {
            font-size: 1.125rem;
            color: var(--muted-foreground);
            max-width: 50rem;
            line-height: 1.625;
        }

        /* Message section */
        .message-container {
            margin-bottom: 3rem;
        }

        .message {
            padding: 1.5rem 2rem;
            border: 2px solid var(--border);
            font-family: var(--font-display);
            font-size: 1.25rem;
            letter-spacing: -0.025em;
            line-height: 1.3;
        }

        .message.success {
            background-color: var(--muted);
            border-color: var(--foreground);
        }

        .message.error {
            background-color: var(--foreground);
            color: var(--background);
        }

        /* Upload form section */
        .upload-section {
            padding: 4rem 0;
            border-bottom: 8px solid var(--foreground);
            margin-bottom: 4rem;
        }

        @media (min-width: 768px) {
            .upload-section {
                padding: 6rem 0;
                margin-bottom: 6rem;
            }
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            line-height: 1;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            .section-title {
                font-size: 3.5rem;
            }
        }

        /* Upload form */
        .upload-form {
            background-color: var(--background);
        }

        /* Drag and drop zone */
        .drop-zone {
            border: 2px dashed var(--border);
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 100ms;
            position: relative;
        }

        @media (min-width: 768px) {
            .drop-zone {
                padding: 4rem 3rem;
            }
        }

        .drop-zone.dragover {
            background-color: var(--muted);
            border-color: var(--foreground);
            border-width: 4px;
        }

        .drop-zone-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-family: var(--font-mono);
            letter-spacing: 0.1em;
        }

        .drop-zone-text {
            font-family: var(--font-display);
            font-size: 1.5rem;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .drop-zone-subtext {
            font-size: 0.875rem;
            color: var(--muted-foreground);
            margin-top: 1rem;
        }

        /* File input */
        .file-input {
            display: none;
        }

        /* Button styles */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            background-color: var(--foreground);
            color: var(--background);
            border: 2px solid var(--foreground);
            font-family: var(--font-display);
            font-size: 0.875rem;
            letter-spacing: 0.1em;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 100ms;
            text-decoration: none;
            border-radius: 0;
        }

        .btn:hover {
            background-color: var(--background);
            color: var(--foreground);
        }

        .btn:focus-visible {
            outline: 3px solid var(--foreground);
            outline-offset: 3px;
        }

        .btn.secondary {
            background-color: transparent;
            color: var(--foreground);
        }

        .btn.secondary:hover {
            background-color: var(--foreground);
            color: var(--background);
        }

        .btn.loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Form group */
        .form-group {
            margin-bottom: 2rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            border: none;
            border-bottom: 2px solid var(--border);
            font-family: var(--font-body);
            font-size: 1rem;
            background-color: transparent;
            color: var(--foreground);
            transition: border-width 100ms;
        }

        .form-input::placeholder {
            color: var(--muted-foreground);
            font-style: italic;
        }

        .form-input:focus-visible {
            outline: none;
            border-bottom-width: 4px;
        }

        /* Upload status */
        .upload-status {
            margin-top: 2rem;
            padding: 1.5rem;
            border: 1px solid var(--border-light);
            display: none;
        }

        .upload-status.active {
            display: block;
        }

        .upload-status.success {
            background-color: var(--muted);
        }

        .upload-progress {
            width: 100%;
            height: 2px;
            background-color: var(--border-light);
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .upload-progress-bar {
            height: 100%;
            background-color: var(--foreground);
            width: 0%;
            transition: width 100ms;
        }

        .upload-status-text {
            font-family: var(--font-mono);
            font-size: 0.875rem;
            color: var(--muted-foreground);
        }

        /* Files section */
        .files-section {
            padding: 4rem 0;
        }

        @media (min-width: 768px) {
            .files-section {
                padding: 6rem 0;
            }
        }

        .files-list {
            list-style: none;
        }

        .files-item {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border-light);
            transition: all 100ms;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .files-item:last-child {
            border-bottom: none;
        }

        .files-item:hover {
            padding-left: 1rem;
            padding-right: 1rem;
            margin-left: -1rem;
            margin-right: -1rem;
            background-color: var(--muted);
        }

        .files-link {
            font-family: var(--font-display);
            font-size: 1.125rem;
            color: var(--foreground);
            text-decoration: none;
            transition: all 100ms;
            flex-grow: 1;
        }

        .files-link:hover {
            text-decoration: underline;
        }

        .files-link:focus-visible {
            outline: 3px solid var(--foreground);
            outline-offset: 2px;
        }

        .files-meta {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--muted-foreground);
            letter-spacing: 0.1em;
            margin-left: 1rem;
        }

        .files-icon {
            width: 24px;
            height: 24px;
            border: 2px solid var(--foreground);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.625rem;
            margin-left: 1rem;
            cursor: pointer;
            transition: all 100ms;
        }

        .files-icon:hover {
            background-color: var(--foreground);
            color: var(--background);
        }

        /* Empty state */
        .empty-state {
            padding: 3rem 2rem;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        @media (min-width: 768px) {
            .empty-state {
                padding: 4rem 3rem;
            }
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .empty-state-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .empty-state-text {
            color: var(--muted-foreground);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 100ms ease-in;
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .hero h1 {
                font-size: 2rem;
                margin-bottom: 0.5rem;
            }

            .section-title {
                font-size: 1.5rem;
            }

            .drop-zone {
                padding: 2rem 1.5rem;
            }

            .drop-zone-icon {
                font-size: 2rem;
            }

            .drop-zone-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Hidden data container for Thymeleaf values -->
    <div id="thymeleafData" 
         th:data-message="${message != null ? message : ''}"
         th:data-files="${#strings.listJoin(files, '||')}"
         style="display: none;">
    </div>

    <!-- Skip to main content link -->
    <a href="#main-content" style="position: absolute; top: -40px; left: 0; background: var(--foreground); color: var(--background); padding: 8px 16px; z-index: 100; focus:top: 0;">Skip to content</a>

    <div class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1>Archive</h1>
            <p>Secure document storage and retrieval system. Upload files for safekeeping and access them anytime.</p>
        </section>

        <!-- Message Container -->
        <div id="messageContainer" class="message-container"></div>

        <!-- Upload Section -->
        <section class="upload-section" id="uploadSection">
            <h2 class="section-title">Upload File</h2>
            
            <form class="upload-form" method="POST" enctype="multipart/form-data" action="/" id="uploadForm">
                <!-- Drop Zone -->
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-icon">⬆</div>
                    <div class="drop-zone-text">Drop file here</div>
                    <div class="drop-zone-subtext">or click to select</div>
                </div>

                <input type="file" id="fileInput" name="file" class="file-input">

                <!-- Upload Status -->
                <div id="uploadStatus" class="upload-status">
                    <div class="upload-progress">
                        <div id="uploadProgressBar" class="upload-progress-bar"></div>
                    </div>
                    <div class="upload-status-text" id="uploadStatusText">Uploading...</div>
                </div>

                <!-- Upload Button -->
                <div style="margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                    <button type="button" id="selectBtn" class="btn">Select File</button>
                    <button type="submit" id="uploadBtn" class="btn secondary" style="display: none;">Upload</button>
                </div>
            </form>
        </section>

        <!-- Files Section -->
        <section class="files-section" id="filesSection">
            <h2 class="section-title">Uploaded Files</h2>
            <div id="filesList"></div>
        </section>
    </div>

    <script>
        // ===== DOM Elements =====
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const selectBtn = document.getElementById('selectBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadForm = document.getElementById('uploadForm');
        const uploadStatus = document.getElementById('uploadStatus');
        const uploadStatusText = document.getElementById('uploadStatusText');
        const uploadProgressBar = document.getElementById('uploadProgressBar');
        const messageContainer = document.getElementById('messageContainer');
        const filesList = document.getElementById('filesList');
        const filesSection = document.getElementById('filesSection');
        const thymeleafData = document.getElementById('thymeleafData');

        // ===== Event Listeners =====

        // Select file button
        selectBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                showFileSelected(file);
            }
        });

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                showFileSelected(files[0]);
            }
        });

        // Drop zone click
        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        // Form submission
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            await uploadFile();
        });

        // ===== Functions =====

        function showFileSelected(file) {
            const fileName = file.name;
            const fileSize = formatFileSize(file.size);
            dropZone.innerHTML = `
                <div class="drop-zone-icon">✓</div>
                <div class="drop-zone-text">${escapeHtml(fileName)}</div>
                <div class="drop-zone-subtext">${fileSize} • Ready to upload</div>
            `;
            uploadBtn.style.display = 'inline-flex';
            selectBtn.textContent = 'Change File';
        }

        async function uploadFile() {
            const file = fileInput.files[0];
            if (!file) return;

            uploadBtn.disabled = true;
            uploadBtn.classList.add('loading');
            uploadStatus.classList.add('active');
            uploadStatusText.textContent = 'Uploading ' + escapeHtml(file.name) + '...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const xhr = new XMLHttpRequest();

                // Progress tracking
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = (e.loaded / e.total) * 100;
                        uploadProgressBar.style.width = percentComplete + '%';
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status === 200) {
                        showSuccessMessage('File uploaded successfully');
                        resetForm();
                        loadFilesList();
                    } else {
                        showErrorMessage('Upload failed: ' + xhr.statusText);
                    }
                    uploadBtn.disabled = false;
                    uploadBtn.classList.remove('loading');
                });

                xhr.addEventListener('error', () => {
                    showErrorMessage('Upload failed. Please try again.');
                    uploadBtn.disabled = false;
                    uploadBtn.classList.remove('loading');
                });

                xhr.open('POST', '/', true);
                xhr.send(formData);

            } catch (error) {
                showErrorMessage('Upload error: ' + error.message);
                uploadBtn.disabled = false;
                uploadBtn.classList.remove('loading');
            }
        }

        function resetForm() {
            fileInput.value = '';
            uploadBtn.style.display = 'none';
            uploadStatus.classList.remove('active');
            uploadStatusText.textContent = 'Uploading...';
            uploadProgressBar.style.width = '0%';
            selectBtn.textContent = 'Select File';
            dropZone.innerHTML = `
                <div class="drop-zone-icon">⬆</div>
                <div class="drop-zone-text">Drop file here</div>
                <div class="drop-zone-subtext">or click to select</div>
            `;
        }

        function showSuccessMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'message success fade-in';
            msg.textContent = text;
            messageContainer.innerHTML = '';
            messageContainer.appendChild(msg);
            setTimeout(() => messageContainer.innerHTML = '', 5000);
        }

        function showErrorMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'message error fade-in';
            msg.textContent = text;
            messageContainer.innerHTML = '';
            messageContainer.appendChild(msg);
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadFilesList() {
            try {
                const response = await fetch('/');
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Try to extract files from the response
                // This is a fallback - ideally we'd have an API endpoint
                renderFilesList();
            } catch (error) {
                console.error('Error loading files:', error);
                renderFilesList();
            }
        }

        function renderFilesList() {
            // Get files from the page data attribute if available
            const filesData = document.body.getAttribute('data-files');
            
            if (filesData) {
                const files = JSON.parse(filesData);
                renderFiles(files);
            } else {
                // Fallback: load from current page
                loadFilesFromPage();
            }
        }

        function renderFiles(files) {
            if (!files || files.length === 0) {
                filesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <div class="empty-state-title">No files yet</div>
                        <div class="empty-state-text">Start by uploading your first file above</div>
                    </div>
                `;
                return;
            }

            const ul = document.createElement('ul');
            ul.className = 'files-list';

            files.forEach(fileUrl => {
                const fileName = fileUrl.split('/').pop();

                const li = document.createElement('li');
                li.className = 'files-item';
                li.innerHTML = `
                    <a href="${escapeHtml(fileUrl)}" class="files-link" download>${escapeHtml(fileName)}</a>
                    <span class="files-meta">Download</span>
                `;
                ul.appendChild(li);
            });

            filesList.innerHTML = '';
            filesList.appendChild(ul);
        }

        function loadFilesList() {
            const filesData = thymeleafData.getAttribute('data-files');
            if (filesData && filesData.trim()) {
                const files = filesData.split('||').filter(f => f.trim());
                renderFiles(files);
            } else {
                renderFiles([]);
            }
        }

        // ===== Initialize =====
        document.addEventListener('DOMContentLoaded', () => {
            // Check for initial message from Thymeleaf
            const messageData = thymeleafData.getAttribute('data-message');
            if (messageData && messageData.trim()) {
                const isSuccess = messageData.toLowerCase().includes('successfully') || 
                                messageData.toLowerCase().includes('success');
                if (isSuccess) {
                    showSuccessMessage(messageData);
                } else {
                    showErrorMessage(messageData);
                }
            }

            // Render files list
            loadFilesList();
        });
    </script>
</body>
</html>
